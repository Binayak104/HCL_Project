name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform (deploy/destroy)'
        required: true
        default: 'deploy'
        type: choice
        options:
        - deploy
        - destroy

env:
  ENVIRONMENT: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'deploy' }}
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and push Docker image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: hcl-project-backend-${{ env.ENVIRONMENT }}
        IMAGE_TAG: latest
      working-directory: ./backend
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Update Lambda Code
      run: |
        aws lambda update-function-code --function-name hcl-project-api-${{ env.ENVIRONMENT }} --image-uri ${{ steps.login-ecr.outputs.registry }}/hcl-project-backend-${{ env.ENVIRONMENT }}:latest

  destroy:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'destroy' }}
    steps:
    - name: Placeholder for Backend Teardown
      run: echo "Backend teardown is managed via Terraform Infrastructure Layer 2 destroy."
