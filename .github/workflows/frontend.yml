name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform (deploy/destroy)'
        required: true
        default: 'deploy'
        type: choice
        options:
        - deploy
        - destroy

env:
  ENVIRONMENT: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'deploy' }}
    steps:
    - uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and push Docker image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: hcl-project-frontend-${{ env.ENVIRONMENT }}
        IMAGE_TAG: latest
      working-directory: ./frontend
      run: |
        docker build --build-arg NEXT_PUBLIC_API_URL=http://placeholder-url -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  destroy:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'destroy' }}
    steps:
    - name: Placeholder for Frontend Teardown
      run: echo "Frontend teardown is managed via Terraform Infrastructure Layer 2 destroy."