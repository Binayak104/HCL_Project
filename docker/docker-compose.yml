version: '3.9'

services:
  postgres:
    image: ankane/pgvector:latest # Pre-built image with pgvector
    container_name: postgres_vector
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=vecdb
      - POSTGRES_USER=dbadmin
      - POSTGRES_PASSWORD=password123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    driver: local
